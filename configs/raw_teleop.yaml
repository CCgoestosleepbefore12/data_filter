# raw teleop / NAS 质量闸门配置
# 阈值均为 provisional，待真实分布 + review 队列校准。

source_kind: teleop

# TODO: 填 NAS/teleop 真实数据根
data_roots:
  - ""   # TODO

# 启用的检查（raw gate）
checks:
  spike: true            # S1 突变（qpos/action/eef）
  tracking: false        # 非 lighthouse，不适用
  extreme: false         # 待实现：S3 极值（绝对值可用）
  timestamp: true        # 时间戳/丢帧（含 eef_left/right_time 同步）
  modality: true         # 模态长度一致
  video_quality: true    # C3 黑/糊/静止画面
  state_action: true     # S2 qpos vs action 趋势对齐
  arm_activity: true     # 单臂信号冻结/缺失

# provisional 阈值
thresholds:
  spike:
    residual_sigma: 6.0
    accel_sigma: 6.0
    jerk_sigma: 6.0
    min_spike_frames: 200      # 按真实分布校准：只标明显异常段
  extreme:
    alpha: 1.5
    use_velocity: false
    exempt_gripper: true       # 夹爪维豁免（双峰）
  state_action:
    da_threshold: 0.65         # 方向一致性阈值（论文 0.6~0.7）
    max_lag_frames: 15         # 允许的最大时滞
    max_points: 300            # 长 episode 下采样，控制全量扫描成本
    smooth_window: 5
    active_eps: 1.0e-4
    min_active_ratio: 0.05
  timestamp:
    max_dt_ratio: 3.0
    max_clock_skew_s: 0.05     # eef_left vs eef_right vs 主时钟
  arm_activity:
    min_unique_rows: 3
    min_mean_std: 1.0e-5
    unique_decimals: 6
  video_quality:
    sample_frames: 4
    black_luma: 8.0
    blur_var: 50.0
    static_min_frames: 45
    static_diff_eps: 1.0
    max_black_ratio: 0.05
    max_blur_ratio: 0.5
    max_decode_failure_ratio: 0.0

output:
  write_mask: true
  write_report: true
  write_exclude_list: true
