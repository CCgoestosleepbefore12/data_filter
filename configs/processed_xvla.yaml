# processed XVLA 质量闸门配置（P0，最贴近当前训练数据）
# 阈值均为 provisional，待真实分布 + review 队列校准。

# TODO: 填一个或多个 processed XVLA 根目录
data_roots:
  - ""   # TODO

# 每个 processed episode 声明其来源，决定 attrs 契约
source_kinds: [pika_umi, nas_teleop]

# hard-validity 检查（失败直接 drop/block）
hard_checks:
  schema_shape: true     # qpos (T,20)
  finite: true           # 无 NaN/Inf
  modality: true         # 各模态 T 一致
  timestamp: true        # 单调递增 + dt 无异常大跳变
  rot6d: true            # finite + 单位范数 + 正交（det 无法判手性）
  gripper: true          # 二值、值域 [0,1]
  attrs: true            # pose_frame/tip2base/domain/time attrs
  manifest: false        # 后置（当前训练不强依赖）
  decode_contract: false # 待实现
  lazy_reader_smoke: false  # 需配置训练-loader adapter 后开启

# quality 检查（出 score/flag，不 hard drop）
quality_checks:
  motion: true           # 速度/加速度/jerk/长静止/过快
  video_quality: true    # 模糊/黑帧/静止画面比例
  coverage: false        # 待实现：操作阶段 / 夹爪动作覆盖
  multicam: false        # 待实现：多相机可用性

# provisional 阈值
thresholds:
  rot6d:
    tol: 1.0e-3          # 正交容差（float32 + roundtrip）；判据 = finite + 单位范数 + 正交
  gripper:
    binary_tol: 1.0e-3
  timestamp:
    max_dt_ratio: 3.0    # max dt ≤ ratio·中位 dt，否则判大跳变
  motion:
    jerk_sigma: 6.0
    static_min_frames: 45
    static_speed_eps: 1.0e-5
    min_gripper_changes: 1
    min_speed_outlier_frames: 3
    min_jerk_outlier_frames: 200
    speed_hi_pct: 99     # 速度分布高分位，供速度对齐参考
  video_quality:
    sample_frames: 16
    black_luma: 8.0
    blur_var: 50.0
    static_min_frames: 45
    static_diff_eps: 1.0
    max_black_ratio: 0.05
    max_blur_ratio: 0.5
    max_decode_failure_ratio: 0.0

# 决策：三级 + 输出（不重写 hdf5）
decision:
  labels: [keep_high_quality, keep_with_downweight, review, drop]
  review_when_quality_flags_ge: 2   # 透明规则分级（暂不使用加权标量）
output:
  write_report: true
  write_scores: true       # episode_scores.jsonl
  write_split_lists: true  # keep/downweight/drop
  write_sampling_weights: true
  rewrite_hdf5: false
